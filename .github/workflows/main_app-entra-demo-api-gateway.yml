# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - app-entra-demo-api-gateway

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Replace Frontend URL for production
        shell: pwsh
        run: |
          $file = "src/MicrosoftEntraIdDemoApp/Api/MirsoftEntraDemo.ApiGateway/appsettings.json"
          $json = Get-Content $file -Raw | ConvertFrom-Json
          $json.FrontendUrl = "https://witty-meadow-0ebb9c603.1.azurestaticapps.net/"
          $json | ConvertTo-Json -Depth 10 | Set-Content $file

      - name: Replace Application URL for production
        shell: pwsh
        run: |
          $file = "src/MicrosoftEntraIdDemoApp/Api/MirsoftEntraDemo.ApiGateway/Properties/launchSettings.json"
          $json = Get-Content $file -Raw | ConvertFrom-Json
          $json.profiles.https.applicationUrl = "https://app-entra-demo-api-gateway-cff7bjdec5dxahe3.canadacentral-01.azurewebsites.net/"
          $json | ConvertTo-Json -Depth 10 | Set-Content $file

      - name: Build with dotnet
        run: dotnet build src/MicrosoftEntraIdDemoApp/Api/MirsoftEntraDemo.ApiGateway/MirsoftEntraDemo.ApiGateway.csproj --configuration Release

      - name: dotnet publish
        run: dotnet publish src/MicrosoftEntraIdDemoApp/Api/MirsoftEntraDemo.ApiGateway/MirsoftEntraDemo.ApiGateway.csproj -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E28D57617C7F4E03AB6ABC77B9F0020B }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E8BB2B31E0EA44BF8AE5D21E54EE7066 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D524302ACF2B46DBA12FDAEA8A5AB874 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-entra-demo-api-gateway'
          slot-name: 'Production'
          package: .